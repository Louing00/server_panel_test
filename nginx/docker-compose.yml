version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/letsencrypt:ro
      - ./www:/var/www/certbot:ro
      - ./log:/var/log/nginx
    restart: unless-stopped
    networks:
      - nginx-net

networks:
  nginx-net:
    driver: bridge

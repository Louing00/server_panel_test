version: "3.8"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: sm-server
    ports:
      - "3200:3200"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3200
      - DATABASE_URL=file:/app/data/server-manager.db
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    restart: unless-stopped
    networks:
      - sm-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: sm-client
    restart: unless-stopped
    networks:
      - sm-network

  nginx:
    image: nginx:alpine
    container_name: sm-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/letsencrypt:ro
      - ./docker/nginx/www:/var/www/certbot:ro
    depends_on:
      - server
      - client
    restart: unless-stopped
    networks:
      - sm-network

networks:
  sm-network:
    driver: bridge
